name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations in staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: python scripts/migrate.py
      - name: Deploy app to staging
        run: echo "Replace with staging deploy command"
      - name: Verify staging health and SLOs
        env:
          STAGING_HEALTHCHECK_URL: ${{ secrets.STAGING_HEALTHCHECK_URL }}
          STAGING_SLO_METRICS_URL: ${{ secrets.STAGING_SLO_METRICS_URL }}
          MIN_AVAILABILITY: "0.99"
          MAX_P95_LATENCY_MS: "500"
        run: |
          set -euo pipefail
          if [[ -z "${STAGING_HEALTHCHECK_URL:-}" || -z "${STAGING_SLO_METRICS_URL:-}" ]]; then
            echo "Staging health/SLO URLs are not configured; skipping post-deploy verification"
            exit 0
          fi
          [[ "$STAGING_HEALTHCHECK_URL" =~ ^https?:// ]] || {
            echo "Invalid STAGING_HEALTHCHECK_URL: must start with http:// or https://"
            echo "Skipping post-deploy verification due to invalid staging URL configuration"
            exit 0
          }
          [[ "$STAGING_SLO_METRICS_URL" =~ ^https?:// ]] || {
            echo "Invalid STAGING_SLO_METRICS_URL: must start with http:// or https://"
            echo "Skipping post-deploy verification due to invalid staging URL configuration"
            exit 0
          }
          curl --fail --silent --show-error "$STAGING_HEALTHCHECK_URL"

          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          metrics_url = os.environ["STAGING_SLO_METRICS_URL"]
          min_availability = float(os.environ["MIN_AVAILABILITY"])
          max_p95_latency = float(os.environ["MAX_P95_LATENCY_MS"])

          with urllib.request.urlopen(metrics_url, timeout=10) as resp:
              payload = json.loads(resp.read().decode("utf-8"))

          availability = float(payload["availability"])
          p95_latency_ms = float(payload["p95_latency_ms"])

          failures = []
          if availability < min_availability:
              failures.append(
                  f"availability={availability:.5f} < minimum={min_availability:.5f}"
              )
          if p95_latency_ms > max_p95_latency:
              failures.append(
                  f"p95_latency_ms={p95_latency_ms:.2f} > maximum={max_p95_latency:.2f}"
              )

          if failures:
              print("Post-deploy staging verification failed:\n- " + "\n- ".join(failures))
              sys.exit(1)

          print("Post-deploy staging verification passed.")
          PY

      - name: Roll back staging to previous stable revision
        if: failure()
        env:
          STAGING_PREVIOUS_STABLE_REVISION: ${{ secrets.STAGING_PREVIOUS_STABLE_REVISION }}
        run: |
          echo "Rolling back staging to ${STAGING_PREVIOUS_STABLE_REVISION}"
          echo "Replace with staging rollback command"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations in production
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: python scripts/migrate.py
      - name: Deploy app to production
        run: echo "Replace with production deploy command"
      - name: Verify production health and SLOs
        env:
          PRODUCTION_HEALTHCHECK_URL: ${{ secrets.PRODUCTION_HEALTHCHECK_URL }}
          PRODUCTION_SLO_METRICS_URL: ${{ secrets.PRODUCTION_SLO_METRICS_URL }}
          MIN_AVAILABILITY: "0.999"
          MAX_P95_LATENCY_MS: "300"
        run: |
          set -euo pipefail
          if [[ -z "${PRODUCTION_HEALTHCHECK_URL:-}" || -z "${PRODUCTION_SLO_METRICS_URL:-}" ]]; then
            echo "Production health/SLO URLs are not configured; skipping post-deploy verification"
            exit 0
          fi
          [[ "$PRODUCTION_HEALTHCHECK_URL" =~ ^https?:// ]] || {
            echo "Invalid PRODUCTION_HEALTHCHECK_URL: must start with http:// or https://"
            echo "Skipping post-deploy verification due to invalid production URL configuration"
            exit 0
          }
          [[ "$PRODUCTION_SLO_METRICS_URL" =~ ^https?:// ]] || {
            echo "Invalid PRODUCTION_SLO_METRICS_URL: must start with http:// or https://"
            echo "Skipping post-deploy verification due to invalid production URL configuration"
            exit 0
          }
          curl --fail --silent --show-error "$PRODUCTION_HEALTHCHECK_URL"

          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          metrics_url = os.environ["PRODUCTION_SLO_METRICS_URL"]
          min_availability = float(os.environ["MIN_AVAILABILITY"])
          max_p95_latency = float(os.environ["MAX_P95_LATENCY_MS"])

          with urllib.request.urlopen(metrics_url, timeout=10) as resp:
              payload = json.loads(resp.read().decode("utf-8"))

          availability = float(payload["availability"])
          p95_latency_ms = float(payload["p95_latency_ms"])

          failures = []
          if availability < min_availability:
              failures.append(
                  f"availability={availability:.5f} < minimum={min_availability:.5f}"
              )
          if p95_latency_ms > max_p95_latency:
              failures.append(
                  f"p95_latency_ms={p95_latency_ms:.2f} > maximum={max_p95_latency:.2f}"
              )

          if failures:
              print("Post-deploy production verification failed:\n- " + "\n- ".join(failures))
              sys.exit(1)

          print("Post-deploy production verification passed.")
          PY

      - name: Roll back production to previous stable revision
        if: failure()
        env:
          PRODUCTION_PREVIOUS_STABLE_REVISION: ${{ secrets.PRODUCTION_PREVIOUS_STABLE_REVISION }}
        run: |
          echo "Rolling back production to ${PRODUCTION_PREVIOUS_STABLE_REVISION}"
          echo "Replace with production rollback command"
