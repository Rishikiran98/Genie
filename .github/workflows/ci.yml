name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-validate-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genie
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genie"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/genie

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run migrations on ephemeral Postgres
        run: python scripts/migrate.py
      - name: Run tests
        run: pytest
