name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-benchmark:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genie
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genie"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/genie

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff

      - name: Lint
        run: ruff check .

      - name: Run migrations on ephemeral Postgres
        run: python scripts/migrate.py

      - name: Run unit tests
        run: pytest tests/unit

      - name: Run integration tests
        run: pytest tests/integration

      - name: Run smoke tests
        run: pytest tests/smoke

      - name: Benchmark smoke gate
        run: |
          PYTHONPATH=. python -m evaluation.benchmark_runner
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("datasets/runs/latest_benchmark.json").read_text())
          if not report.get("all_thresholds_passed", False):
              raise SystemExit("Benchmark smoke gate failed: threshold checks did not pass")
          print("Benchmark smoke gate passed")
          PY
